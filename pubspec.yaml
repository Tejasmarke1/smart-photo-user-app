name: user_app
description: "Lumina — Smart Photo Sharing for event guests"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # ── Navigation ──
  go_router: ^14.0.1

  # ── Networking ──
  dio: ^5.4.1
  retrofit: ^4.1.0
  json_annotation: ^4.8.1

  # ── Auth & Secure Storage ──
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # ── Image Loading & Viewing ──
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  shimmer: ^3.0.0
  image_picker: ^1.0.7
  flutter_staggered_grid_view: ^0.7.0

  # ── Camera & QR ──
  camera: ^0.10.5+9
  permission_handler: ^11.3.0
  mobile_scanner: ^5.0.1

  # ── Payments (Razorpay) ──
  razorpay_flutter: ^1.3.5

  # ── Firebase Push Notifications ──
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.1

  # ── UI Utilities ──
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  icons_plus: ^5.0.0

  # ── Misc ──
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
